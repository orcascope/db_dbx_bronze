resources:
  jobs:
    propane_landing_ingestion:
      name: propane-landing-ingestion-${bundle.target}
      description: >
        Fans out a SQL Server -> Landing (Parquet) ingestion across a
        list of tables. Each list entry carries its own
        source_schema, source_table, pk_columns, watermark_column,
        load_type, and num_partitions. The same python_file runs once
        per entry with those values as CLI args.
      tags:
        team: analytics
        domain: propane
        layer: landing
        env: ${bundle.target}
      tasks:
        - task_key: ingest_all_tables
          job_cluster_key: ingest_cluster
          for_each_task:
            # Maximum number of table ingestions to run in parallel on the
            # same job cluster. Start at 2-4 raise after measuring
            # impact with the DBA.
            concurrency: 2

            # Inline JSON array. Each object is one iteration of the inner
            # task. Add / remove tables here -- no other file changes needed.
            #
            # Fields:
            #   source_schema    : SQL Server schema (usually dbo)
            #   source_table     : SQL Server table name
            #   pk_columns       : single column "TankId" or composite "CustomerId,AddressId"
            #   watermark_column : timestamp column for incr loads ("" for full)
            #   load_type        : "incr" or "full"
            #   num_partitions   : JDBC read parallelism (1 = single-threaded)
            inputs: |
              [
                {
                  "source_schema":    "dbo",
                  "source_table":     "Customer",
                  "pk_columns":       "CustomerId",
                  "watermark_column": "ModifiedDate",
                  "load_type":        "incr",
                  "num_partitions":   "4"
                },
                {
                  "source_schema":    "dbo",
                  "source_table":     "Tank",
                  "pk_columns":       "TankId",
                  "watermark_column": "ModifiedDate",
                  "load_type":        "incr",
                  "num_partitions":   "4"
                },
                {
                  "source_schema":    "dbo",
                  "source_table":     "CustomerAddress",
                  "pk_columns":       "CustomerId,AddressId",
                  "watermark_column": "ModifiedDate",
                  "load_type":        "incr",
                  "num_partitions":   "4"
                },
                {
                  "source_schema":    "dbo",
                  "source_table":     "TankReading",
                  "pk_columns":       "TankId,SensorId,ReadingTimestamp",
                  "watermark_column": "ReadingTimestamp",
                  "load_type":        "incr",
                  "num_partitions":   "8"
                },
                {
                  "source_schema":    "dbo",
                  "source_table":     "ProductCatalog",
                  "pk_columns":       "ProductId",
                  "watermark_column": "",
                  "load_type":        "full",
                  "num_partitions":   "1"
                },
                {
                  "source_schema":    "dbo",
                  "source_table":     "Route",
                  "pk_columns":       "RouteId",
                  "watermark_column": "",
                  "load_type":        "full",
                  "num_partitions":   "1"
                }
              ]

            task:
              task_key: ingest_one
              job_cluster_key: ingest_cluster
              spark_python_task:
                python_file: ../src/ingest_sql_to_landing.py
                parameters:
                  - "--source_catalog=${var.source_catalog}"
                  - "--source_schema={{input.source_schema}}"
                  - "--source_table={{input.source_table}}"
                  - "--pk_columns={{input.pk_columns}}"
                  - "--watermark_column={{input.watermark_column}}"
                  - "--load_type={{input.load_type}}"
                  - "--num_partitions={{input.num_partitions}}"
                  - "--landing_path=${var.landing_volume}"
                  - "--watermark_state_table=${var.watermark_state_table}"
              libraries: []
              timeout_seconds: 7200
              max_retries: 1
              min_retry_interval_millis: 60000

      job_clusters:
        - job_cluster_key: ingest_cluster
          new_cluster:
            spark_version: ${var.cluster_spark_version}
            node_type_id: ${var.cluster_node_type}
            num_workers: 2
            data_security_mode: SINGLE_USER

      email_notifications:
        on_failure:
          - data-platform-alerts@chpk.example.com
