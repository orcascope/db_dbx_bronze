resources:
  jobs:

    propane_landing_ingestion:
      name: propane-landing-ingestion-${bundle.target}
      description: >
        Lands one SQL Server table from the UC foreign catalog into the
        landing Volume as Parquet files. Driven by job-level parameters,
        so the same job definition serves every table.

      tags:
        team: analytics
        domain: propane
        layer: landing
        env: ${bundle.target}

      # Job-level parameters become {{job.parameters.<name>}} placeholders
      # available to the task below. Override at run time via:
      #   databricks bundle run propane_landing_ingestion --params key=value,...
      parameters:
        - name: source_catalog
          default: ${var.source_catalog}
        - name: source_schema
          default: dbo
        - name: source_table
          default: ""
        - name: pk_columns
          default: ""
        - name: watermark_column
          default: ""
        - name: load_type
          default: incr

      tasks:
        - task_key: ingest_table
          job_cluster_key: ingest_cluster
          spark_python_task:
            python_file: ../src/ingest_sql_to_landing.py
            parameters:
              - "--source_catalog={{job.parameters.source_catalog}}"
              - "--source_schema={{job.parameters.source_schema}}"
              - "--source_table={{job.parameters.source_table}}"
              - "--pk_columns={{job.parameters.pk_columns}}"
              - "--watermark_column={{job.parameters.watermark_column}}"
              - "--load_type={{job.parameters.load_type}}"
              - "--landing_path=${var.landing_volume}"
              - "--watermark_state_table=${var.watermark_state_table}"
          libraries: []
          timeout_seconds: 7200
          max_retries: 1
          min_retry_interval_millis: 60000

      job_clusters:
        - job_cluster_key: ingest_cluster
          new_cluster:
            spark_version: ${var.cluster_spark_version}
            node_type_id: ${var.cluster_node_type}
            num_workers: 2
            data_security_mode: SINGLE_USER

      email_notifications:
        on_failure:
          - data-platform-alerts@chpk.example.com

